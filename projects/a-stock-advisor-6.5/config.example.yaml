# A股量化投顾系统配置示例
# 复制此文件为 config.yaml 并根据需要修改

app_name: a_stock_advisor
version: "6.5.0"
debug: false
log_level: INFO

data:
  data_root: ./data
  lookback_days: 365
  update_time: "20:00"
  max_retry: 3
  retry_delay: 60

trading:
  initial_capital: 1000000.0
  commission_rate: 0.0003
  slippage: 0.001
  max_position_per_stock: 0.15
  max_positions: 20

risk:
  max_drawdown: 0.15
  stop_loss: 0.08
  position_limit: 0.95
  industry_concentration: 0.30

strategy:
  rebalance_frequency: weekly
  benchmark: "000300.SH"
  min_stocks: 5
  max_stocks: 20

notification:
  enabled: false
  channels: []
  webhook_url: null
  email_recipients: []
